<h1>Student Dashboard</h1>
<input type="text" id="searchInput" placeholder="Search by Name..." onkeyup="searchStudent()">

<select id="filterStatus" onchange="filterStudents()">
    <option value="all">All Students</option>
    <option value="A+">Pass</option>
    <option value="A">Fail</option>
</select>
<link rel="stylesheet" href="style.css">
<div class="dashboard-cards">

<div class="card">
<h2 id="totalStudents">0</h2>
<p>Total Students</p>
</div>

<div class="card">
<h2 id="passedStudents">0</h2>
<p>Passed Students</p>
</div>

<div class="card">
<h2 id="failedStudents">0</h2>
<p>Failed Students</p>
</div>

<div class="card">
<h2 id="averageMarks">0%</h2>
<p>Average Marks</p>
</div>
</div>
